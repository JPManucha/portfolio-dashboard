<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
 <style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f172a;color:#e2e8f0;padding:12px}
.container{max-width:1200px;margin:0 auto}
h1{font-size:1.3rem;margin-bottom:6px;color:#f8fafc}
h2{font-size:1rem;margin-bottom:10px;color:#94a3b8}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.kpi-card{background:#1e293b;border-radius:10px;padding:12px}
.kpi-label{font-size:.7rem;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.kpi-value{font-size:1.2rem;font-weight:700;margin-top:3px}
.green{color:#22c55e}
.red{color:#ef4444}
.neutral{color:#e2e8f0}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.card{background:#1e293b;border-radius:10px;padding:14px}
.card.full{grid-column:1/-1;margin-bottom:16px}
canvas{max-height:300px;width:100%}
#timelineChart{max-height:350px}
.card canvas{display:block}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:left;padding:6px 4px;border-bottom:1px solid #334155;color:#64748b;font-weight:600;white-space:nowrap}
td{padding:6px 4px;border-bottom:1px solid #1e293b;white-space:nowrap}
.loading{text-align:center;padding:40px;color:#64748b;font-size:1.1rem}
.error{text-align:center;padding:40px;color:#ef4444;font-size:1.1rem}
@media(max-width:640px){
  body{padding:8px}
  .kpi-grid{grid-template-columns:repeat(2,1fr);gap:6px}
  .kpi-card{padding:8px}
  .kpi-value{font-size:1rem}
  .row{grid-template-columns:1fr;gap:10px}
  .card{padding:10px}
  canvas{max-height:220px}
  #timelineChart{max-height:260px}
  h1{font-size:1.1rem}
  h2{font-size:.9rem}
}
</style>
</head>
<body>
<div class="container" id="app">
<div class="loading" id="loading">Cargando datos...</div>
</div>

<script>
const API = 'https://zxajkzerhpubvtayhapx.functions.supabase.co/dashboard'

let TOKEN = sessionStorage.getItem('dash_token')
if (!TOKEN) {
  TOKEN = new URLSearchParams(location.search).get('k') || new URLSearchParams(location.search).get('token')
  if (TOKEN) {
    sessionStorage.setItem('dash_token', TOKEN)
    history.replaceState(null, '', location.pathname)
  }
}
if (!TOKEN) { document.getElementById('app').innerHTML = '<div class="error">Falta ?k= en la URL</div>'; throw '' }

;(async () => {
  try {
    const res = await fetch(API + '?token=' + TOKEN)
    if (!res.ok) throw new Error('HTTP ' + res.status)
    const d = await res.json()
    sessionStorage.setItem('dash_token', TOKEN)
    render(d)
  } catch(e) {
    if (e) document.getElementById('app').innerHTML = '<div class="error">Error al cargar datos: ' + e.message + '</div>'
  }
})()

function render(d) {
  const { kpis, pie, pnlBars, timeline, alerts, recentTxs, holdings } = d

  // Sort pie descending
  const sortedPie = pie.slice().sort((a, b) => b.value - a.value)

  // Build timeline series — use SPY/QQQ dates as base, forward-fill portfolio values
  const spyIndex = new Map(timeline.spy.map(s => [s.date, s.price]))
  const qqqIndex = new Map(timeline.qqq.map(q => [q.date, q.price]))
  const pointMap = new Map(timeline.points.map(p => [p.date, p]))
  const allDates = Array.from(new Set([...timeline.points.map(p => p.date), ...timeline.spy.map(s => s.date), ...timeline.qqq.map(q => q.date)])).sort()
  const firstSpy = spyIndex.size ? Array.from(spyIndex.values())[0] : 1
  const firstQqq = qqqIndex.size ? Array.from(qqqIndex.values())[0] : 1
  const totalInv = timeline.points[timeline.points.length - 1]?.cumInvested || kpis.totalValor

  const dateLabels = [], totalInvSeries = [], valueSeries = [], spySeries = [], qqqSeries = []
  let lastInv = 0, lastVal = 0
  for (const d of allDates) {
    const p = pointMap.get(d)
    if (p) { lastInv = p.cumInvested; lastVal = p.invested }
    dateLabels.push(d)
    totalInvSeries.push(lastInv)
    valueSeries.push(lastVal)
    const sp = spyIndex.get(d)
    spySeries.push(sp !== undefined ? (sp / firstSpy) * totalInv : null)
    const qp = qqqIndex.get(d)
    qqqSeries.push(qp !== undefined ? (qp / firstQqq) * totalInv : null)
  }

  const fmt = n => { if (Math.abs(n) >= 1000) return '$' + (n / 1000).toFixed(1) + 'K'; return '$' + n.toFixed(0) }
  const shortDate = s => { const m = { '01':'Ene','02':'Feb','03':'Mar','04':'Abr','05':'May','06':'Jun','07':'Jul','08':'Ago','09':'Sep','10':'Oct','11':'Nov','12':'Dic' }; return (m[s.slice(5,7)]||s.slice(5,7)) + ' ' + parseInt(s.slice(8,10)) }

  const colors = ['#3b82f6','#22c55e','#eab308','#a855f7','#ef4444','#06b6d4','#f97316','#8b5cf6','#14b8a6','#ec4899']

  document.getElementById('app').innerHTML = `
<h1>📊 Portfolio Dashboard</h1>
<div class="kpi-grid">
  <div class="kpi-card"><div class="kpi-label">Valor Total</div><div class="kpi-value neutral">$${kpis.totalValor.toFixed(2)}</div></div>
  <div class="kpi-card"><div class="kpi-label">Invertido</div><div class="kpi-value neutral">$${kpis.invertidoProductivo.toFixed(2)}</div></div>
  <div class="kpi-card"><div class="kpi-label">Liquidez</div><div class="kpi-value neutral">$${kpis.liquidez.toFixed(2)}</div></div>
  <div class="kpi-card"><div class="kpi-label">PnL No Real.</div><div class="kpi-value ${kpis.totalPnl >= 0 ? 'green' : 'red'}">${kpis.totalPnl >= 0 ? '+' : ''}$${kpis.totalPnl.toFixed(2)}</div></div>
  <div class="kpi-card"><div class="kpi-label">PnL Real.</div><div class="kpi-value ${kpis.totalRealizado >= 0 ? 'green' : 'red'}">${kpis.totalRealizado >= 0 ? '+' : ''}$${kpis.totalRealizado.toFixed(2)}</div></div>
  <div class="kpi-card"><div class="kpi-label">Retorno Total</div><div class="kpi-value ${kpis.retornoTotal >= 0 ? 'green' : 'red'}">${kpis.retornoTotal >= 0 ? '+' : ''}${kpis.retornoTotal.toFixed(2)}%</div></div>
</div>

<div class="row">
  <div class="card"><h2>Composición</h2><canvas id="pieChart"></canvas></div>
  <div class="card"><h2>PnL por Activo</h2><canvas id="pnlChart"></canvas></div>
</div>

<div class="card full"><h2>Evolución vs SPY / QQQ</h2><canvas id="timelineChart"></canvas></div>

<div class="row">
  <div class="card"><h2>Concentración</h2>${alerts.length === 0 ? '<p style="color:#64748b">Ninguna > 5%</p>' : alerts.map(a => `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #1e293b;font-size:.85rem"><span>${a.level === 'CRITICAL' ? '🔴' : a.level === 'WARNING' ? '🟡' : '⚪'} <strong>${a.activo}</strong> (${a.broker})</span><span>${a.pct}% | $${a.valor.toFixed(2)}</span></div>`).join('')}</div>
  <div class="card"><h2>Últimas Operaciones</h2>
    <div class="table-wrap"><table><tr><th>Fecha</th><th>Op</th><th>Activo</th><th>Cant</th><th>Total</th></tr>
    ${recentTxs.slice(0,8).map(t => `<tr><td>${t.fecha}</td><td>${t.operacion === 'Compra' ? '🟢' : '🔴'}</td><td>${t.activo}</td><td>${t.cantidad.toFixed(4)}</td><td>$${t.total.toFixed(2)}</td></tr>`).join('')}
    </table></div></div>
</div>

<div class="card full"><h2>Holdings</h2>
  <div class="table-wrap"><table><tr><th>Activo</th><th>Broker</th><th>Tipo</th><th>Cant</th><th>Precio</th><th>Valor</th><th>Invertido</th><th>PnL%</th></tr>
  ${holdings.map(h => `<tr><td><strong>${h.activo}</strong>${h.ratio ? ' <span style="font-size:.65rem;color:#64748b">r:'+h.ratio+'</span>' : ''}</td><td>${h.broker}</td><td>${h.tipo}</td><td>${h.cantidad.toFixed(h.tipo === 'CEDEAR' ? 0 : 4)}</td><td>$${h.precio.toFixed(2)}</td><td>$${h.valor.toFixed(2)}</td><td>$${h.invertido.toFixed(2)}</td><td style="color:${h.pnlPct >= 0 ? '#22c55e' : '#ef4444'}">${h.pnlPct >= 0 ? '+' : ''}${h.pnlPct.toFixed(2)}%</td></tr>`).join('')}
  </table></div></div>
`

  new Chart(document.getElementById('pieChart'), {
    type: 'doughnut',
    data: { labels: sortedPie.map(p => p.ticker), datasets: [{ data: sortedPie.map(p => p.value), backgroundColor: colors }] },
    options: {
      responsive: true, cutout: '72%',
      plugins: {
        legend: { position: 'bottom', labels: { color: '#64748b', font: { size: 9 }, boxWidth: 10, padding: 8 } },
        tooltip: { callbacks: { label: ctx => { const d = sortedPie[ctx.dataIndex]; return d.label + ': $' + d.value.toFixed(2) + ' | PnL: ' + (d.pnl >= 0 ? '+' : '') + '$' + d.pnl.toFixed(2) + ' (' + (d.pnlPct >= 0 ? '+' : '') + d.pnlPct.toFixed(2) + '%)' } } }
      }
    }
  })

  new Chart(document.getElementById('pnlChart'), {
    type: 'bar',
    data: { labels: pnlBars.map(p => p.activo), datasets: [{ label: 'PnL USD', data: pnlBars.map(p => p.pnl), backgroundColor: pnlBars.map(p => p.pnl >= 0 ? '#22c55e' : '#ef4444') }] },
    options: {
      responsive: true, indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: { x: { ticks: { color: '#64748b', callback: v => fmt(v) }, grid: { color: '#1e293b' } }, y: { ticks: { color: '#94a3b8', font: { size: 10 } } } }
    }
  })

  new Chart(document.getElementById('timelineChart'), {
    type: 'line', data: {
      labels: dateLabels,
      datasets: [
        { label: 'Capital Aportado', data: totalInvSeries, borderColor: '#64748b', borderDash: [4,4], fill: false, pointRadius: 0, tension: .1 },
        { label: 'Valor Cartera', data: valueSeries, borderColor: '#3b82f6', fill: false, pointRadius: 0, tension: .1 },
        { label: 'SPY', data: spySeries, borderColor: '#22c55e', fill: false, pointRadius: 0, tension: .1, spanGaps: true },
        { label: 'QQQ', data: qqqSeries, borderColor: '#a855f7', fill: false, pointRadius: 0, tension: .1, spanGaps: true }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } } },
      scales: {
        y: { ticks: { color: '#64748b', callback: v => fmt(v), maxTicksLimit: 6 }, grid: { color: '#1e293b' } },
        x: { ticks: { color: '#64748b', maxTicksLimit: 12, callback: function(v) { const lbl = this.getLabelForValue(v); return lbl ? shortDate(lbl) : '' } } }
      }
    }
  })
}
</script>
</body>
</html>
